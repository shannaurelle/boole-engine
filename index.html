<body>

<main>

<div>

<h1> Boole Engine </h1>

<div> <em> Write the <a href="exprhelp.html">expression</a> to simplify below </em> </div>

<br>

<div> <a href="boolemobius.html">Boole Mobius Transform</a> </div>

<br>

<div>

<input id="bar" type="text" />
<br>
<button type="button" onclick="submit()">Simplify
</div>

<br>

<div id="ans-panel">
<!-- <p> Expanded Expression</p>
<math id="given" display="block"> </math> -->
<p> Simplified Expression </p>
<math display="block" id="simple"> </math>
<p> Variables </p>
<math display="block" id="variables"> </math>
<p> Binary Encoding </p>
<math display="block" id="encoding"> </math>
</div>

</div>

</main>

</body>
<script src="booleparser.js"></script>
<script src="booleparserutils.js"></script>
<script>

function submit(){

var given = document.getElementById('bar').value;
var unique_variables = unique_letters(given);
document.getElementById("variables").innerHTML = unique_variables;
//console.log(given);

var encoding = generate_encoding(unique_variables);
var expression = new BitwiseRecursiveParser(remove_exponent(given),encoding);
var result = expression.parse();
var table = expression.get_table();

//console.log("Structure:");
//console.log(result);
var simplifiedExpression = render_math(BitwiseRecursiveParser.format_output(result,table));
document.getElementById('simple').innerHTML = simplifiedExpression;

document.getElementById('encoding').textContent = '';
document.getElementById('encoding').appendChild(generate_table(encoding));

}

</script>
