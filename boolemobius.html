<script>

function generateLetters(n) {
  // Return early if requested size exceeds the English alphabet
  if (n > 26) {
    throw new RangeError("Size 'n' cannot be greater than 26 for unique lowercase letters.");
  }

  const letters = new Set();
  const alphabet = "abcdefghijklmnopqrstuvwxyz";

  while (letters.size < n) {
    const randomIndex = Math.floor(Math.random() * alphabet.length);
    letters.add(alphabet[randomIndex]);
  }

  return Array.from(letters).join("");
}

function generateTerm(bitstring,encoding){
    let terms = [];
    for(let i=0; i < encoding.length; i++){
        if(bitstring[i]==="1"){
            terms.push(encoding[i][0]);
        }
    }
    return terms.join("+");
}

function submit(){
    var given = toBitarray(document.getElementById('bar').value);
    //console.log(given);
    var transformed = toBitstring(boole_mobius_transform(given));
    var tstring = transformed.replaceAll(",","");
    document.getElementById("transform").innerHTML = tstring;

    const n = Math.floor(Math.log2(given.length));
    const variables = generateLetters(n);
    const encoding = generate_encoding(variables.split("").join(","));
    const expr = generateTerm(tstring,encoding);
    const input = encoding[encoding.length-1][0];
    const header = [input.split('').reverse('').join(''),expr];
    const data = Array.from({ length: 2**n }, (_, i) =>
                [i.toString(2).padStart(n,"0"), tstring[i]]);
    const table = generate_table(data,header);
    document.getElementById("truthtable").textContent = '';
    document.getElementById("truthtable").appendChild(table);

    document.getElementById("expression").innerHTML = render_math(expr);
}

</script>
