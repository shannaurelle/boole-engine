<script>

function submit(){
    var given = powerOfTwoBitstringToInt(document.getElementById('bar').value);
    console.log(given);
    var transformed = intToPowerOfTwoBitstring(boole_mobius_transform(given));
    console.log("Transformed:")
    console.log(transformed);
    // Example for 3 variables (8x8 matrix)
    const mobiusMatrix = generateBooleMobiusMatrix(3);
    console.log(mobiusMatrix.map(row => row.join(" ")).join("\n"));
    document.getElementById("transform").innerHTML = transformed.replaceAll(",","");
}
