<script>

function powerOfTwoBitstringToInt(string) {
    return parseInt(string, 2);
}

function intToPowerOfTwoBitstring(num) {
    // 1. Convert to an unsigned 32-bit binary string
    const binStr = (num >>> 0).toString(2);

    // 2. Calculate the next closest power of two length
    const len = Math.max(1, 1 << Math.ceil(Math.log2(binStr.length)));

    // 3. Pad the start of the string with zeros
    return binStr.padStart(len, '0');
}

function submit(){
    var given = powerOfTwoBitstringToInt(document.getElementById('bar').value);
    console.log(given);
    var transformed = intToPowerOfTwoBitstring(given);
    document.getElementById("transform").innerHTML = transformed;
}

</script>
